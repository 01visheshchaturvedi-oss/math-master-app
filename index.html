<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Speed Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      .fade-in {
        animation: fadeIn 0.2s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .grid-cell {
        width: 100%;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        font-weight: 700;
        border: 1px solid #e2e8f0;
        transition: all 0.2s;
      }
      .grid-header {
        background-color: #fef08a;
        color: #854d0e;
      }
      .grid-total-label {
        background-color: #bbf7d0;
        color: #166534;
        font-size: 0.65rem;
      }
      .grid-active {
        background-color: #dbeafe;
        outline: 3px solid #3b82f6;
        z-index: 20;
        position: relative;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
      }
      .grid-error {
        background-color: #fee2e2;
        color: #b91c1c;
        outline: 2px solid #ef4444;
      }
      .grid-filled {
        background-color: #ffffff;
        color: #1e293b;
      }

      .custom-shadow {
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.05),
          0 8px 10px -6px rgba(0, 0, 0, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      .table-btn {
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.2s;
        border: 1px solid #e2e8f0;
      }
      .table-btn.active {
        background-color: #eff6ff;
        border-color: #3b82f6;
        color: #3b82f6;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div
      id="app"
      class="w-full max-w-xl bg-white rounded-[2rem] custom-shadow overflow-hidden border border-slate-100"
    >
      <div class="p-20 text-center text-slate-400 font-bold">Initializing App...</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
